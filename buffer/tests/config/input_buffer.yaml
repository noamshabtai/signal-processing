base:
  input_buffer:
    dtype: float32
    buffer_size: 1000
    step_size: 100

cases:
  - name: channel_shape
    input_buffer:
      sweep:
        channel_shape:
          - [1, 4]
          - [4, 1]
          - [3, 6]

  - name: step_does_not_divide
    input_buffer:
      channel_shape: [1]
      step_size: 32
