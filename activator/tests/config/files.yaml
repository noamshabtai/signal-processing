base:
  activator:
    input:
      dtype: int16
    output:
      dir: output
    system:
      input_buffer:
        step_size: 10
        buffer_size: 50
        dtype: int16
    plot:
      show: False

cases:
  - parameters:
      sweep:
        nsamples:
          - 20
          - 30
    activator:
      input:
        sweep:
          path:
            - input.bin
            - input.wav
      system:
        input_buffer:
          sweep:
            channel_shape:
              - [1]
              - [2,3]
      output:
        first:
          dtype: int32
          channel_shape: [1]
          step_size: 10
        second:
          dtype: int64
          channel_shape: [2,3]
          step_size: 10
      plot:
        sweep:
          save:
            - False
            - True
      log:
        sweep:
          rate:
            - 1
            - 2
